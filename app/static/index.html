<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AZ PICKLEBALL // PARTNER FINDER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#06060d; --bg2:#0a0a14;
    --panel:#0d0d18; --panel2:#12121f; --line:#20233c;
    --text:#e9edff; --muted:#7a86b0;
    --cyan:#00f0ff; --pink:#ff2e88; --lime:#c6ff00; --amber:#ffb020; --red:#ff3b5c;
    --glow-cyan:0 0 8px rgba(0,240,255,.55);
    --glow-lime:0 0 8px rgba(198,255,0,.5);
    --glow-pink:0 0 8px rgba(255,46,136,.5);
    --ui:'Rajdhani',system-ui,sans-serif;
    --mono:'Share Tech Mono',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:var(--ui); font-size:15px; line-height:1.45;
    color:var(--text); background:var(--bg);
    background-image:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,46,136,.10), transparent 60%),
      radial-gradient(1000px 500px at 0% 0%, rgba(0,240,255,.10), transparent 55%),
      linear-gradient(transparent 96%, rgba(0,240,255,.05) 100%),
      linear-gradient(90deg, transparent 96%, rgba(0,240,255,.05) 100%);
    background-size:auto,auto,26px 26px,26px 26px;
  }
  header {
    padding:16px 22px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(0,240,255,.06), transparent);
    position:relative;
  }
  header::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, var(--cyan), var(--pink), transparent); opacity:.7; }
  h1 { margin:0; font-size:24px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
       font-style:italic; text-shadow:var(--glow-cyan); }
  h1 .b { color:var(--pink); text-shadow:var(--glow-pink); }
  .sub { color:var(--muted); font-size:13px; margin-top:3px; font-family:var(--mono); letter-spacing:.02em; }
  .wrap { max-width:1320px; margin:0 auto; padding:18px 22px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .panel {
    background:linear-gradient(180deg, var(--panel2), var(--panel));
    border:1px solid var(--line); border-radius:4px; padding:15px; margin-bottom:16px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 0 0 1px rgba(0,0,0,.4);
  }
  .panel h2 { margin:0 0 11px; font-size:13px; text-transform:uppercase; letter-spacing:.18em;
              color:var(--cyan); font-weight:700; }
  button {
    font-family:var(--ui); font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:3px; padding:7px 13px; cursor:pointer; font-size:13px; transition:.15s;
  }
  button:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:var(--glow-cyan); }
  button.primary { background:linear-gradient(180deg,#00f0ff,#00b8cc); color:#00131a;
                   border-color:var(--cyan); box-shadow:var(--glow-cyan); }
  button.primary:hover { color:#00131a; filter:brightness(1.1); }
  button.on { border-color:var(--lime); color:var(--lime); box-shadow:var(--glow-lime); }
  button.small { padding:3px 8px; font-size:12px; }
  input, select {
    font-family:var(--mono); background:var(--bg2); color:var(--text);
    border:1px solid var(--line); border-radius:3px; padding:6px 9px; font-size:13px;
  }
  input:focus, select:focus { outline:none; border-color:var(--cyan); box-shadow:var(--glow-cyan); }
  label.f { display:flex; flex-direction:column; gap:3px; font-size:10px; color:var(--muted);
            text-transform:uppercase; letter-spacing:.12em; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.14em;
       cursor:pointer; user-select:none; white-space:nowrap; font-weight:700; }
  tbody tr { transition:.1s; }
  tbody tr:hover td { background:rgba(0,240,255,.05); box-shadow:inset 3px 0 0 var(--cyan); }
  .tabs { display:flex; gap:4px; margin:10px 0 18px; }
  .tab { padding:10px 20px; border-radius:3px 3px 0 0; background:transparent;
         border:1px solid transparent; border-bottom:2px solid var(--line); color:var(--muted); }
  .tab.active { background:var(--panel); border-color:var(--line); border-bottom:2px solid var(--cyan);
                color:var(--cyan); text-shadow:var(--glow-cyan); }
  .chip { display:inline-block; background:rgba(0,240,255,.06); border:1px solid var(--line);
          border-radius:2px; padding:1px 8px; font-size:11px; margin:2px 3px 2px 0;
          font-family:var(--mono); color:var(--muted); }
  .badge { display:inline-block; border-radius:2px; padding:1px 7px; font-size:11px; font-weight:700;
           text-transform:uppercase; letter-spacing:.06em; border:1px solid; font-family:var(--ui); }
  .b-ok { color:var(--lime); border-color:var(--lime); box-shadow:var(--glow-lime); background:rgba(198,255,0,.07); }
  .b-warn { color:var(--amber); border-color:var(--amber); background:rgba(255,176,32,.08); }
  .b-bad { color:var(--red); border-color:var(--red); background:rgba(255,59,92,.08); }
  .b-info { color:var(--cyan); border-color:var(--cyan); background:rgba(0,240,255,.07); }
  .b-active { color:var(--lime); border-color:var(--lime); background:rgba(198,255,0,.07); }
  .b-inactive { color:var(--red); border-color:var(--red); background:rgba(255,59,92,.08); }
  .b-unknown { color:var(--muted); border-color:var(--line); }
  .rating { font-family:var(--mono); font-weight:600; font-variant-numeric:tabular-nums; }
  .rating.sweet { color:var(--lime); text-shadow:var(--glow-lime); }
  a { color:var(--cyan); text-decoration:none; border-bottom:1px dotted rgba(0,240,255,.4); }
  a:hover { text-shadow:var(--glow-cyan); border-bottom-color:var(--cyan); }
  .muted { color:var(--muted); }
  .ok { color:var(--lime); }
  .src-item { display:flex; justify-content:space-between; align-items:center; gap:10px;
              padding:8px 11px; border:1px solid var(--line); border-radius:3px; margin-bottom:6px;
              background:var(--bg2); }
  .src-item .meta { font-size:11px; color:var(--muted); font-family:var(--mono); }
  .hidden { display:none; }
  .grid2 { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:12px; }
  .tcard { background:var(--bg2); border:1px solid var(--line); border-radius:3px; padding:13px;
           transition:.15s; }
  .tcard:hover { border-color:rgba(0,240,255,.4); box-shadow:0 0 14px rgba(0,240,255,.08); }
  .tcard h3 { margin:0 0 4px; font-size:16px; font-weight:700; letter-spacing:.02em; }
  .tcard .when { color:var(--cyan); font-size:13px; font-family:var(--mono); }
  details.cand summary { cursor:pointer; color:var(--pink); margin-top:10px; font-size:12px;
                         text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  details.cand summary:hover { text-shadow:var(--glow-pink); }
  .links a { margin-right:9px; font-size:12px; font-family:var(--mono); white-space:nowrap; }
  .pname { display:flex; align-items:center; gap:9px; }
  .avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; flex:none;
            border:1px solid var(--line); }
  .avatar-blank { display:inline-block; background:var(--panel2); }
  .flash { position:fixed; bottom:18px; right:18px; background:var(--panel2);
           border:1px solid var(--cyan); border-radius:3px; padding:11px 15px; box-shadow:var(--glow-cyan);
           font-family:var(--mono); font-size:13px; z-index:99; }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--line);
          border-top-color:var(--cyan); border-radius:50%; animation:s .7s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  ::-webkit-scrollbar { height:10px; width:10px; }
  ::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--cyan); }
</style>
</head>
<body>
<header>
  <h1>&#9670; AZ PICKLEBALL <span class="b">// PARTNER FINDER</span></h1>
  <div class="sub" id="profileLine">initializing&hellip;</div>
</header>

<div class="wrap">
  <div class="panel">
    <h2>Data sources</h2>
    <div class="row" style="margin-bottom:10px;">
      <button class="primary" id="refreshAll">&#8635; Refresh all</button>
      <span id="refreshStatus" class="muted"></span>
    </div>
    <div id="sources"></div>
    <details style="margin-top:8px;">
      <summary class="muted" style="cursor:pointer;">Recent fetch log</summary>
      <div id="fetchLog" style="margin-top:8px;"></div>
    </details>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="partners">Partner Finder</button>
    <button class="tab" data-tab="tournaments">Tournament Board</button>
  </div>

  <!-- PARTNERS -->
  <section id="tab-partners">
    <div class="panel">
      <div class="row">
        <label class="f">Search name<input id="pSearch" placeholder="type a name&hellip;"></label>
        <label class="f">Min DUPR<input id="pMin" type="number" step="0.1" style="width:80px"></label>
        <label class="f">Max DUPR<input id="pMax" type="number" step="0.1" style="width:80px"></label>
        <label class="f">&nbsp;<button id="pSweet">Sweet spot</button></label>
        <label class="f">&nbsp;<button id="pActive" class="on">Active only</button></label>
        <label class="f">&nbsp;<button id="pReload" class="primary">Apply</button></label>
        <span class="muted" id="pCount"></span>
      </div>
      <div class="sub" style="margin-top:9px; text-transform:none; letter-spacing:0;">
        <span class="badge b-ok">sweet</span> competitive spot (<span id="sweetRange"></span>) &middot;
        <span class="badge b-active">active</span> DUPR match &lt;1yr &middot;
        <span class="badge b-inactive">inactive</span> hidden by default &middot;
        full ceiling <span id="ceilRange"></span>
      </div>
    </div>
    <div class="panel" style="overflow-x:auto;">
      <table id="pTable">
        <thead><tr>
          <th data-sort="name">Player</th>
          <th data-sort="dupr_doubles">DUPR&nbsp;Dbl</th>
          <th data-sort="dupr_singles">Sgl</th>
          <th data-sort="city">City</th>
          <th data-sort="last_match_date">Last&nbsp;match</th>
          <th>Research / contact</th>
          <th>Signed up for</th>
          <th></th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>Add a player manually</h2>
      <div class="row">
        <input id="npName" placeholder="Name*">
        <input id="npD" type="number" step="0.001" placeholder="DUPR doubles" style="width:120px">
        <input id="npCity" placeholder="City">
        <input id="npIg" placeholder="Instagram">
        <input id="npEmail" placeholder="Email">
        <input id="npPhone" placeholder="Phone">
        <button class="primary" id="npAdd">Add player</button>
      </div>
    </div>
  </section>

  <!-- TOURNAMENTS -->
  <section id="tab-tournaments" class="hidden">
    <div class="panel">
      <div class="row">
        <label class="f">&nbsp;<button id="tTarget">My divisions</button></label>
        <label class="f">&nbsp;<button id="tMetro">In target metro</button></label>
        <label class="f">Source<select id="tSource"><option value="">all sources</option></select></label>
        <label class="f">&nbsp;<button id="tReload" class="primary">Apply</button></label>
        <span class="muted" id="tCount"></span>
      </div>
    </div>
    <div id="tBoard"></div>
    <div class="panel">
      <h2>Add a tournament manually</h2>
      <div class="row">
        <input id="ntName" placeholder="Name*">
        <input id="ntStart" placeholder="Start (YYYY-MM-DD)" style="width:150px">
        <input id="ntCity" placeholder="City">
        <input id="ntVenue" placeholder="Venue">
        <input id="ntUrl" placeholder="Registration URL">
        <button class="primary" id="ntAdd">Add tournament</button>
      </div>
    </div>
  </section>
</div>

<div id="flash" class="flash hidden"></div>
<script src="/static/app.js?v=3"></script>
</body>
</html>
